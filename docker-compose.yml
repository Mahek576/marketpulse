services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: marketpulse-api
    ports:
      - "8000:8000"
    environment:
      APP_NAME: MarketPulse API
      APP_VERSION: 0.1.0
      ENVIRONMENT: development
      DEBUG: "true"

      DATABASE_URL: postgresql+psycopg://marketpulse:marketpulse@db:5432/marketpulse

      SECRET_KEY: marketpulse-docker-dev-secret-change-this-later
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"

      NEWS_API_KEY: your-newsapi-key-here
      NEWS_API_BASE_URL: https://newsapi.org/v2/everything
      NEWS_API_DEFAULT_LANGUAGE: en
      NEWS_API_DEFAULT_SORT_BY: publishedAt

      ENABLE_CACHE: "true"
      REDIS_URL: redis://redis:6379/0
      CACHE_TTL_SECONDS: "300"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  db:
    image: postgres:16
    container_name: marketpulse-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: marketpulse
      POSTGRES_PASSWORD: marketpulse
      POSTGRES_DB: marketpulse
    volumes:
      - marketpulse_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: marketpulse-redis
    ports:
      - "6379:6379"
    volumes:
      - marketpulse_redis_data:/data

volumes:
  marketpulse_postgres_data:
  marketpulse_redis_data: